                            <div class="hero-image-animation-script w-embed w-script">
                                <script>
                                    const speedByClass = {
                                        '.hero-image': 0.1,  // phone = slowest
                                        '.hero-expense-tile': 0.2, // all tiles = medium
                                        '.hero-coin': 0.3  // all coins = fastest
                                    };

                                    const groups = Object.entries(speedByClass).map(([selector, speed]) => ({
                                        nodes: document.querySelectorAll(selector),
                                        speed
                                    }));

                                    function parallax() {
                                        const s = window.scrollY;
                                        groups.forEach(({ nodes, speed }) => {
                                            nodes.forEach(node => {
                                                node.style.transform = `translateY(${-s * speed}px)`;
                                            });
                                        });
                                        requestAnimationFrame(parallax);
